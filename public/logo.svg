  <!-- Wordmark: KENYA -->
  <text x="105" y="242" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="14" font-weight="700" fill="#C8902E" letter-spacing="7">KENYA</text>
</svg>
