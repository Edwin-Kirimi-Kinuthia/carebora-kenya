<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 265" role="img" aria-label="Care Bora Kenya">
  <!-- Kenya map outline -->
  <path fill="none" stroke="#006B3F" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"
