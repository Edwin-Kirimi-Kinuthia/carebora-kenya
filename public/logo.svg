  <!-- Right person — head -->
  <circle cx="146" cy="96" r="7" fill="#C8902E"/>
  <path fill="none" stroke="#C8902E" stroke-width="2.2" stroke-linecap="round"
    d="M152,103 C160,93 167,80 171,67 M146,103 L148,117"/>

  <!-- Wordmark: Care Bora -->
  <text x="100" y="210" text-anchor="middle"
